<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Colmena Hub</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/m3-theme.css') }}">
    <style>
        body {
            margin: 0;
            font-family: 'Roboto', sans-serif;
            background: var(--md-background);
            color: var(--md-text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .auth-container {
            width: 100%;
            max-width: 400px;
            padding: 32px;
            box-sizing: border-box;
            background: var(--md-surface);
            border-radius: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }
        @media (max-width: 600px) {
            body {
                align-items: flex-start;
                background: var(--md-surface);
            }
            .auth-container {
                box-shadow: none;
                padding: 24px;
                border-radius: 0;
            }
        }
        .header {
            text-align: center;
            margin-bottom: 32px;
        }
        .header h1 {
            font-size: 2rem;
            font-weight: 500;
            margin: 0;
            color: var(--md-text);
        }
        .header p {
            color: var(--md-text-variant);
            margin-top: 8px;
            font-size: 0.95rem;
        }
        .icon {
            width: 72px;
            height: 72px;
            color: var(--md-primary);
            margin: 0 auto 16px auto;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 16px;
        }
        .input-group label {
            color: var(--md-text-variant);
            font-size: 0.85rem;
            font-weight: 500;
            margin-left: 4px;
        }
        .input-group input {
            background: var(--md-surface-container);
            border: 1px solid var(--md-outline-variant);
            color: var(--md-text);
            padding: 16px;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
        }
        .input-group input:focus {
            border-color: var(--md-primary);
            background: var(--md-surface-container-high);
        }
        .btn-primary {
            background: var(--md-primary);
            color: var(--md-on-primary);
            border: none;
            padding: 16px;
            border-radius: 100px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            width: 100%;
            margin-top: 8px;
        }
        .btn-primary:active {
            transform: scale(0.98);
        }
        .btn-secondary {
            background: transparent;
            color: var(--md-primary);
            border: 1px solid var(--md-outline-variant);
            padding: 16px;
            border-radius: 100px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
            margin-top: 16px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            box-sizing: border-box;
        }
        .btn-secondary:active {
            background: var(--md-surface-container);
        }
        .error-msg {
            background: rgba(229, 115, 115, 0.15);
            color: var(--md-error);
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 0.9rem;
            margin-bottom: 16px;
        }
        .success-msg {
            background: rgba(76, 175, 80, 0.15);
            color: #81c784;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 0.9rem;
            margin-bottom: 16px;
            border: 1px solid rgba(76, 175, 80, 0.3);
        }
    </style>
</head>
<body class="theme-dark">
    <div class="auth-container">
        <div class="header">
            <div class="icon">
                {% include 'UI/icons/svg/home.svg' ignore missing %}
            </div>
            <h1>Colmena Hub</h1>
            <p>Inicia sesión localmente para gestionar tu hogar.</p>
        </div>

        <form action="/login" method="POST">
            <input type="hidden" name="next" value="{{ request.args.get('next', '') }}">
            {% if error %}
            <div class="error-msg">{{ error }}</div>
            {% endif %}
            {% if msg %}
            <div class="success-msg">{{ msg }}</div>
            {% endif %}

            <div class="input-group">
                <label>Correo electrónico o Usuario</label>
                <input type="text" name="username" required>
            </div>

            <div class="input-group" style="margin-bottom: 24px;">
                <label>Contraseña</label>
                <input type="password" name="password" required>
            </div>

            <button type="submit" class="btn-primary">Iniciar Sesión</button>
            <a href="/register" class="btn-secondary">Crear cuenta local</a>
        </form>
    </div>
</body>
</html>
