{# Macros Jinja para Toasts, Snackbars y Spinners (Material 3) #}

{% macro m3_spinner(size='40px', color='var(--md-primary)', stroke_width='4px') %}
<div class="m3-spinner-container" style="width: {{ size }}; height: {{ size }};">
    <svg class="m3-spinner-svg" viewBox="25 25 50 50">
        <circle class="m3-spinner-path" cx="50" cy="50" r="20" fill="none" stroke-width="{{ stroke_width }}" stroke-miterlimit="10" stroke="{{ color }}"/>
    </svg>
</div>
<style>
.m3-spinner-container { animation: rotate 2s linear infinite; }
.m3-spinner-svg { width: 100%; height: 100%; }
.m3-spinner-path {
    stroke-dasharray: 1, 200; stroke-dashoffset: 0;
    animation: dash 1.5s ease-in-out infinite;
    stroke-linecap: round;
}
@keyframes rotate { 100% { transform: rotate(360deg); } }
@keyframes dash {
    0% { stroke-dasharray: 1, 200; stroke-dashoffset: 0; }
    50% { stroke-dasharray: 89, 200; stroke-dashoffset: -35px; }
    100% { stroke-dasharray: 89, 200; stroke-dashoffset: -124px; }
}
</style>
{% endmacro %}

{% macro m3_snackbar(id='global-snackbar') %}
<div id="{{ id }}" class="m3-snackbar">
    <div class="m3-snackbar-content">
        <span class="m3-snackbar-text"></span>
        <button class="m3-snackbar-action" style="display:none;"></button>
    </div>
</div>
<style>
.m3-snackbar {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translate(-50%, 100%);
    opacity: 0;
    background: var(--md-inverse-surface, #313033);
    color: var(--md-inverse-on-surface, #F4EFF4);
    min-width: 300px;
    max-width: 600px;
    border-radius: 4px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s;
    z-index: 9999;
    pointer-events: none;
}
.m3-snackbar.show {
    transform: translate(-50%, 0);
    opacity: 1;
    pointer-events: auto;
}
.m3-snackbar-content { display: flex; justify-content: space-between; align-items: center; width: 100%; gap: 16px; }
.m3-snackbar-text { font-size: 0.875rem; font-weight: 400; font-family: inherit; }
.m3-snackbar-action {
    background: none; border: none; padding: 0; margin: 0;
    color: var(--md-inverse-primary, #D0BCFF);
    font-size: 0.875rem; font-weight: 500; font-family: inherit;
    cursor: pointer; text-transform: uppercase; letter-spacing: 0.1em;
}
.m3-snackbar-action:hover { opacity: 0.8; }
</style>
{% endmacro %}
