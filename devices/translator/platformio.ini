[platformio]
default_envs = rp2040

; ─── Base común ──────────────────────────────────────────────────────────────
[env]
framework = arduino
lib_deps =
    nRF24/RF24 @ ^1.4.7
    nRF24/RF24Network @ ^1.0.17
    nRF24/RF24Mesh @ ^1.1.8
    EEPROM
    SPI
    LittleFS
    bblanchon/ArduinoJson @ ^6.21.3
    adafruit/Adafruit SSD1306 @ ^2.5.9
    adafruit/Adafruit GFX Library @ ^1.11.9
monitor_speed = 115200

; Include dirs:
;   src/       → para includes locales del dispositivo
;   config/    → PinConfig.h, RadioConfig.h (aportados por el dispositivo)
;   ../../shared  → acceso completo a shared/ (mesh, colmena, display, transport...)
build_src_filter =
    +<*>
    +<../../shared/mesh/MeshConnection.cpp>
    +<../../shared/mesh/MasterMeshConnection.cpp>
    +<../../shared/colmena/ColmenaBase.cpp>
    +<../../shared/colmena/ColmenaMaster.cpp>
    +<../../shared/display/render/Renderer.cpp>
    +<../../shared/display/ui/UILayout.cpp>
build_flags =
    -I src
    -I config
    -I ../shared

; ─── RP2040 / YD-RP2040 (HID over TinyUSB) ──────────────────────────────────
[env:rp2040]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = pico
board_build.core = earlephilhower
board_build.filesystem = littlefs
build_src_filter =
    ${env.build_src_filter}
    +<../../shared/params/FlashStore.cpp>
    +<../../shared/transport/hid/HIDTransport.cpp>
build_flags =
    ${env.build_flags}
    -D IS_RP2040
    -D USE_TINYUSB
lib_deps = ${env.lib_deps}

; ─── ESP8266 (Serial JSON) ───────────────────────────────────────────────────
[env:esp8266]
platform = espressif8266
board = nodemcuv2
build_src_filter =
    ${env.build_src_filter}
    +<../../shared/transport/serial/SerialTransport.cpp>
build_flags =
    ${env.build_flags}
    -D IS_ESP8266
lib_deps = ${env.lib_deps}

; ─── ESP32 (Serial JSON) ─────────────────────────────────────────────────────
[env:esp32]
platform = espressif32
board = esp32dev
build_src_filter =
    ${env.build_src_filter}
    +<../../shared/transport/serial/SerialTransport.cpp>
build_flags =
    ${env.build_flags}
    -D IS_ESP32
lib_deps = ${env.lib_deps}

; ─── Arduino (Serial JSON) ───────────────────────────────────────────────────
[env:arduino_nano]
platform = atmelavr
board = nanoatmega328
build_src_filter =
    ${env.build_src_filter}
    +<../../shared/transport/serial/SerialTransport.cpp>
build_flags =
    ${env.build_flags}
    -D IS_ARDUINO
lib_deps = ${env.lib_deps}
