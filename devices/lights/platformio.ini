[platformio]
default_envs = esp8266

; ─── Base común ──────────────────────────────────────────────────────────────
[env]
framework = arduino
lib_deps =
    nRF24/RF24 @ ^1.4.7
    nRF24/RF24Network @ ^1.0.17
    nRF24/RF24Mesh @ ^1.1.8
    EEPROM
    SPI
    LittleFS
monitor_speed = 115200

; Include dirs:
;   src/     → para includes locales del dispositivo
;   config/  → PinConfig.h, RadioConfig.h (aportados por el dispositivo)
;   ../../shared  → acceso a todo shared/ (connection, mesh, colmena, params, actuators)
build_src_filter =
    +<*>
    +<../../shared/mesh/MeshConnection.cpp>
    +<../../shared/colmena/ColmenaBase.cpp>
    +<../../shared/colmena/ColmenaNode.cpp>
    +<../../shared/actuators/relay/Relay.cpp>
    +<../../shared/actuators/relay/RelayBank.cpp>
build_flags =
    -I src
    -I config
    -I ../shared

; ─── RP2040 / YD-RP2040 ──────────────────────────────────────────────────────
[env:rp2040]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = pico
board_build.core = earlephilhower
board_build.filesystem = littlefs
build_src_filter =
    ${env.build_src_filter}
    +<../../shared/params/FlashStore.cpp>
build_flags =
    ${env.build_flags}
    -D IS_RP2040
lib_deps = ${env.lib_deps}

; ─── ESP8266 / NodeMCU ───────────────────────────────────────────────────────
[env:esp8266]
platform = espressif8266
board = nodemcuv2
build_flags =
    ${env.build_flags}
    -D IS_ESP8266
lib_deps = ${env.lib_deps}

; ─── ESP32 ───────────────────────────────────────────────────────────────────
[env:esp32]
platform = espressif32
board = esp32dev
build_flags =
    ${env.build_flags}
    -D IS_ESP32
lib_deps = ${env.lib_deps}

; ─── Arduino Nano/Uno ────────────────────────────────────────────────────────
[env:arduino_nano]
platform = atmelavr
board = nanoatmega328
build_flags =
    ${env.build_flags}
    -D IS_ARDUINO
lib_deps = ${env.lib_deps}
