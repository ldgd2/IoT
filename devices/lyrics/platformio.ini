[platformio]
default_envs = rp2040

; ─── Base común ──────────────────────────────────────────────────────────────
[env]
framework = arduino
lib_deps =
    nRF24/RF24 @ ^1.4.7
    nRF24/RF24Network @ ^1.0.17
    nRF24/RF24Mesh @ ^1.1.8
    EEPROM
    SPI
    Wire
    LittleFS
    adafruit/Adafruit SSD1306 @ ^2.5.9
    adafruit/Adafruit GFX Library @ ^1.11.9
monitor_speed = 115200

build_src_filter =
    +<*>
    +<../../shared/mesh/MeshConnection.cpp>
    +<../../shared/colmena/ColmenaBase.cpp>
    +<../../shared/colmena/ColmenaNode.cpp>
    +<../../shared/display/render/Renderer.cpp>
    +<../../shared/error/ColmenaError.cpp>

build_flags =
    -I src
    -I config
    -I ../shared

; ─── RP2040 / YD-RP2040 ──────────────────────────────────────────────────────
[env:rp2040]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = pico
board_build.core = earlephilhower
board_build.filesystem = littlefs
board_build.usbstack = tinyusb
build_src_filter =
    ${env.build_src_filter}
    +<../../shared/params/FlashStore.cpp>
    +<../../shared/transport/hid/HIDTransport.cpp>
build_flags =
    ${env.build_flags}
    -D IS_RP2040
    -D USE_TINYUSB
    -D CFG_TUSB_MCU=OPT_MCU_RP2040
    -D HID_VID=0x2E8A
    -D HID_PID=0x0103
    -D USBD_MANUFACTURER_STRING='"Gerlex"'
    -D USBD_PRODUCT_STRING='"Lyrics Player"'
lib_deps =
    ${env.lib_deps}
    adafruit/Adafruit TinyUSB Library @ ^3.4.4

; ─── ESP8266 / NodeMCU ───────────────────────────────────────────────────────
[env:esp8266]
platform = espressif8266
board = nodemcuv2
board_build.filesystem = littlefs
build_src_filter =
    ${env.build_src_filter}
    +<../../shared/params/EEPROMStore.cpp>
build_flags =
    ${env.build_flags}
    -D IS_ESP8266
lib_deps =
    ${env.lib_deps}

; ─── ESP32 ───────────────────────────────────────────────────────────────────
[env:esp32]
platform = espressif32
board = esp32dev
board_build.filesystem = littlefs
build_src_filter =
    ${env.build_src_filter}
    +<../../shared/params/PreferencesStore.cpp>
build_flags =
    ${env.build_flags}
    -D IS_ESP32
lib_deps =
    ${env.lib_deps}
