{% macro m3_progress_circular(indeterminate=True) %}
<div class="progress-circ {% if indeterminate %}indeterminate{% else %}determinate{% endif %}"></div>
{% endmacro %}

{% macro m3_progress_linear(indeterminate=True) %}
<div class="progress-lin-container">
    <div class="progress-lin {% if indeterminate %}indeterminate{% else %}determinate{% endif %}"></div>
</div>
{% endmacro %}
