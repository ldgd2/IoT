<style>
.m3-control { cursor: pointer; display: flex; align-items: center; position: relative; width: 24px; height: 24px; }
.m3-control input { display: none; }

.m3-box { width: 20px; height: 20px; border: 2px solid var(--md-text); border-radius: 2px; display: flex; justify-content: center; align-items: center; transition: 0.1s; }
.m3-control input:checked + .m3-box { background: var(--md-primary); border-color: var(--md-primary); }
.m3-control input:checked + .m3-box::after { content: ''; width: 5px; height: 10px; border: solid white; border-width: 0 2px 2px 0; transform: rotate(45deg); margin-bottom: 2px; }

.m3-radio { width: 20px; height: 20px; border: 2px solid var(--md-text); border-radius: 50%; display: flex; justify-content: center; align-items: center; transition: 0.1s; }
.m3-control input:checked + .m3-radio { border-color: var(--md-primary); border-width: 6px; }

.m3-switch-label { display: inline-flex; cursor: pointer; }
.m3-switch-label input { display: none; }
.m3-switch {
    position: relative; width: 52px; height: 32px;
    background: var(--md-outline-variant); border-radius: 16px;
    border: 2px solid var(--md-outline); transition: 0.2s;
}
.m3-switch::after {
    content: ''; position: absolute; top: 4px; left: 4px;
    width: 16px; height: 16px; background: var(--md-outline); border-radius: 50%;
    transition: transform 0.2s var(--md-easing), width 0.2s, background 0.2s;
}
.m3-switch-label input:checked + .m3-switch { background: var(--md-primary); border-color: var(--md-primary); }
.m3-switch-label input:checked + .m3-switch::after {
    transform: translateX(20px); width: 24px; height: 24px; top: 2px;
    background-color: var(--md-elevated);
    background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%236B4C12"><path d="M9 16.2L4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4L9 16.2z"/></svg>');
    background-size: 16px; background-position: center; background-repeat: no-repeat;
}
</style>

{% macro m3_checkbox(name, checked=False) %}
<label class="m3-control">
    <input type="checkbox" name="{{ name }}" {% if checked %}checked{% endif %}>
    <div class="m3-box"></div>
</label>
{% endmacro %}

{% macro m3_radio(name, value, checked=False) %}
<label class="m3-control">
    <input type="radio" name="{{ name }}" value="{{ value }}" {% if checked %}checked{% endif %}>
    <div class="m3-radio"></div>
</label>
{% endmacro %}

{% macro m3_switch(name, checked=False) %}
<label class="m3-switch-label">
    <input type="checkbox" name="{{ name }}" {% if checked %}checked{% endif %}>
    <div class="m3-switch"></div>
</label>
{% endmacro %}
