<style>
/* --- ESTILOS DEL CONTENIDO (Hero y Cards) --- */
.hero-section {
    display: grid; grid-template-columns: 1fr; gap: 16px;
    max-width: 1200px; margin: 0 auto 40px auto;
}

@media (min-width: 1100px) { .hero-section { grid-template-columns: 1fr 1.2fr; } }

.hero-card {
    background-color: var(--md-surface); border-radius: var(--radius-extra-large);
    padding: 56px 48px; display: flex; flex-direction: column;
    justify-content: center; align-items: flex-start;
}

.hero-card h1 { font-size: clamp(3rem, 5vw, 4.5rem); font-weight: 400; line-height: 1.05; letter-spacing: -1.5px; margin-bottom: 24px; color: var(--md-text); }
.hero-card p { font-size: 1.1rem; color: var(--md-text-variant); max-width: 400px; margin-bottom: 40px; }

/* Collage (Opcional, para el layout de presentación) */
.collage-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr);
    gap: 16px; border-radius: var(--radius-extra-large); overflow: hidden; background: #23202A;
}
.mockup-card { border-radius: var(--radius-large); background-color: var(--md-surface-container); padding: 16px; display: flex; flex-direction: column; gap: 8px; }
.mockup-1 { grid-column: 1 / 2; grid-row: 1 / 2; background-color: #EADDFF; color: #21005D; }
.mockup-1 .pill { background: #D0BCFF; height: 32px; border-radius: 16px; width: 80%; }
.mockup-2 { grid-column: 2 / 3; grid-row: 1 / 3; background-color: #4F378B; border-radius: 40px; color: white; display: flex; flex-direction: column; justify-content: flex-end; padding: 24px; }
.mockup-2 h3 { font-size: 2.5rem; font-style: italic; font-weight: 400; margin-bottom: 16px; color: #EADDFF;}
.mockup-3 { grid-column: 1 / 2; grid-row: 2 / 3; background-color: #000; border-radius: 32px; display: flex; flex-direction: column; justify-content: flex-end;}
.mockup-3 .bubble-left { background: #381E72; height: 24px; width: 70%; border-radius: 16px 16px 16px 4px; margin-bottom: 8px; }
.mockup-3 .bubble-right { background: #4A4458; height: 24px; width: 60%; border-radius: 16px 16px 4px 16px; align-self: flex-end; }
.mockup-4 { grid-column: 3 / 4; grid-row: 1 / 3; background-color: #1D1B20; border: 1px solid #49454F; border-radius: 40px; padding: 24px; display: flex; flex-direction: column; gap: 16px;}
.mockup-4 .time-box { background: #EADDFF; border-radius: 24px; height: 120px; display: flex; align-items: center; justify-content: center; font-size: 4rem; color: #21005D; }
</style>

{% macro m3_hero_card(title, description, button_html='') %}
<div class="hero-card">
    <h1>{{ title }}</h1>
    <p>{{ description }}</p>
    {{ button_html|safe }}
</div>
{% endmacro %}
