<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="IoT RF Gateway — Panel de control para dispositivos de radio frecuencia" />
  <title>{% block title %}IoT RF Gateway{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ══════════════════════════════════════
       DESIGN TOKENS
    ══════════════════════════════════════ */
    :root {
      --bg-base:      #0a0e1a;
      --bg-surface:   #111827;
      --bg-elevated:  #1a2235;
      --bg-card:      #141e2e;

      --accent:       #00d4ff;
      --accent-dim:   #00a8cc;
      --accent-glow:  rgba(0, 212, 255, 0.18);
      --accent-2:     #7c3aed;
      --success:      #10d97e;
      --warning:      #f59e0b;
      --danger:       #ef4444;
      --offline:      #4b5563;

      --text-primary:   #e2e8f0;
      --text-secondary: #8b9ab0;
      --text-muted:     #4a5568;

      --border:       rgba(255,255,255,0.07);
      --border-accent:rgba(0, 212, 255, 0.25);

      --radius-sm:  6px;
      --radius-md:  12px;
      --radius-lg:  18px;
      --radius-xl:  24px;

      --shadow-card: 0 4px 24px rgba(0,0,0,0.4), 0 1px 3px rgba(0,0,0,0.3);
      --shadow-glow: 0 0 20px rgba(0,212,255,0.15);

      --font-mono: 'JetBrains Mono', monospace;
    }

    /* ══════════════════════════════════════
       RESET & BASE
    ══════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(0,212,255,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 100% 80%, rgba(124,58,237,0.05) 0%, transparent 50%);
    }

    /* ══════════════════════════════════════
       SCROLLBAR
    ══════════════════════════════════════ */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-base); }
    ::-webkit-scrollbar-thumb { background: var(--bg-elevated); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent-dim); }

    /* ══════════════════════════════════════
       NAVBAR
    ══════════════════════════════════════ */
    .navbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,14,26,0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      height: 60px;
      display: flex; align-items: center; justify-content: space-between;
    }

    .navbar-brand {
      display: flex; align-items: center; gap: 10px;
      text-decoration: none; color: var(--text-primary);
    }

    .brand-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      box-shadow: var(--shadow-glow);
    }

    .brand-name {
      font-weight: 700; font-size: 1rem;
      letter-spacing: -0.02em;
    }

    .brand-name span { color: var(--accent); }

    .navbar-links {
      display: flex; gap: 4px; list-style: none;
    }

    .navbar-links a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: var(--radius-sm);
      transition: all 0.2s;
    }

    .navbar-links a:hover,
    .navbar-links a.active {
      color: var(--text-primary);
      background: var(--bg-elevated);
    }

    .navbar-links a.active { color: var(--accent); }

    .navbar-status {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.8rem; color: var(--text-secondary);
    }

    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--success);
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(16,217,126,0.4); }
      50%       { opacity: 0.8; box-shadow: 0 0 0 4px rgba(16,217,126,0); }
    }

    /* ══════════════════════════════════════
       LAYOUT
    ══════════════════════════════════════ */
    .page-wrapper {
      max-width: 1280px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    .page-header {
      margin-bottom: 2rem;
    }

    .page-title {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.2;
      color: var(--text-primary);
    }

    .page-subtitle {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-top: 4px;
    }

    /* ══════════════════════════════════════
       CARDS
    ══════════════════════════════════════ */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
      box-shadow: var(--shadow-card);
      transition: border-color 0.2s, transform 0.2s;
    }

    .card:hover {
      border-color: var(--border-accent);
      transform: translateY(-2px);
    }

    /* ══════════════════════════════════════
       STAT CARDS
    ══════════════════════════════════════ */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.2rem 1.4rem;
      display: flex; flex-direction: column; gap: 6px;
      position: relative; overflow: hidden;
    }

    .stat-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      opacity: 0.6;
    }

    .stat-label {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1;
      color: var(--text-primary);
    }

    .stat-value.accent  { color: var(--accent); }
    .stat-value.success { color: var(--success); }
    .stat-value.warning { color: var(--warning); }
    .stat-value.danger  { color: var(--danger); }

    /* ══════════════════════════════════════
       BADGES / PILLS
    ══════════════════════════════════════ */
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 0.72rem; font-weight: 600;
      padding: 3px 9px;
      border-radius: 999px;
      text-transform: uppercase; letter-spacing: 0.04em;
    }

    .badge-online  { background: rgba(16,217,126,0.12); color: var(--success); }
    .badge-offline { background: rgba(75,85,99,0.25);   color: var(--offline); }
    .badge-error   { background: rgba(239,68,68,0.12);  color: var(--danger); }

    .badge-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: currentColor;
    }

    /* ══════════════════════════════════════
       BUTTONS
    ══════════════════════════════════════ */
    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      font-size: 0.875rem; font-weight: 600;
      padding: 8px 18px;
      border-radius: var(--radius-sm);
      border: none; cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-dim));
      color: #000;
      box-shadow: 0 2px 12px rgba(0,212,255,0.25);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(0,212,255,0.4);
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover {
      color: var(--text-primary);
      background: var(--bg-elevated);
    }

    .btn-danger {
      background: rgba(239,68,68,0.12);
      color: var(--danger);
      border: 1px solid rgba(239,68,68,0.2);
    }

    .btn-danger:hover { background: rgba(239,68,68,0.2); }

    /* ══════════════════════════════════════
       TOGGLE SWITCH
    ══════════════════════════════════════ */
    .toggle {
      position: relative; display: inline-block;
      width: 44px; height: 24px; cursor: pointer;
    }

    .toggle input { opacity: 0; width: 0; height: 0; }

    .toggle-track {
      position: absolute; inset: 0;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 999px;
      transition: all 0.3s;
    }

    .toggle-track::after {
      content: '';
      position: absolute;
      left: 3px; top: 50%; transform: translateY(-50%);
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--text-muted);
      transition: all 0.3s;
    }

    .toggle input:checked + .toggle-track {
      background: rgba(0,212,255,0.15);
      border-color: var(--accent);
    }

    .toggle input:checked + .toggle-track::after {
      left: calc(100% - 19px);
      background: var(--accent);
      box-shadow: 0 0 8px rgba(0,212,255,0.6);
    }

    /* ══════════════════════════════════════
       RSSI BAR
    ══════════════════════════════════════ */
    .rssi-bar {
      display: flex; align-items: flex-end; gap: 2px;
      height: 16px;
    }

    .rssi-bar span {
      width: 4px; border-radius: 1px;
      background: var(--bg-elevated);
      transition: background 0.3s;
    }

    .rssi-bar span:nth-child(1) { height: 4px; }
    .rssi-bar span:nth-child(2) { height: 8px; }
    .rssi-bar span:nth-child(3) { height: 12px; }
    .rssi-bar span:nth-child(4) { height: 16px; }

    .rssi-bar[data-level="4"] span                      { background: var(--success); }
    .rssi-bar[data-level="3"] span:nth-child(-n+3)      { background: var(--success); }
    .rssi-bar[data-level="2"] span:nth-child(-n+2)      { background: var(--warning); }
    .rssi-bar[data-level="1"] span:nth-child(-n+1)      { background: var(--danger); }

    /* ══════════════════════════════════════
       FOOTER
    ══════════════════════════════════════ */
    .footer {
      border-top: 1px solid var(--border);
      padding: 1rem 1.5rem;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.78rem;
      font-family: var(--font-mono);
    }

    /* ══════════════════════════════════════
       UTILITIES
    ══════════════════════════════════════ */
    .flex   { display: flex; }
    .items-center { align-items: center; }
    .gap-1  { gap: 0.5rem; }
    .gap-2  { gap: 1rem; }
    .mt-1   { margin-top: 0.5rem; }
    .mt-2   { margin-top: 1rem; }
    .mb-2   { margin-bottom: 1rem; }
    .text-mono { font-family: var(--font-mono); }
    .text-sm   { font-size: 0.875rem; }
    .text-xs   { font-size: 0.75rem; }
    .text-muted   { color: var(--text-muted); }
    .text-secondary { color: var(--text-secondary); }
    .text-accent  { color: var(--accent); }
    .text-success { color: var(--success); }
    .text-warning { color: var(--warning); }
    .text-danger  { color: var(--danger); }
    .divider { border: none; border-top: 1px solid var(--border); margin: 1.25rem 0; }

    /* ══════════════════════════════════════
       ANIMATIONS
    ══════════════════════════════════════ */
    @keyframes fade-in-up {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .animate { animation: fade-in-up 0.4s ease both; }

    /* ══════════════════════════════════════
       RESPONSIVE
    ══════════════════════════════════════ */
    @media (max-width: 640px) {
      .page-wrapper { padding: 1rem; }
      .navbar-links { display: none; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>

  <!-- ═══════════════ NAVBAR ═══════════════ -->
  <nav class="navbar">
    <a href="/" class="navbar-brand">
      <div class="brand-icon">📡</div>
      <span class="brand-name">IoT <span>RF</span> Gateway</span>
    </a>

    <ul class="navbar-links">
      <li><a href="/" class="{{ 'active' if request.path == '/' }}">Dashboard</a></li>
      <li><a href="/log" class="{{ 'active' if request.path == '/log' }}">RF Log</a></li>
    </ul>

    <div class="navbar-status">
      <div class="status-dot"></div>
      <span id="server-time" class="text-mono"></span>
    </div>
  </nav>

  <!-- ═══════════════ CONTENT ═══════════════ -->
  <main class="page-wrapper">
    {% block content %}{% endblock %}
  </main>

  <!-- ═══════════════ FOOTER ═══════════════ -->
  <footer class="footer">
    IoT RF Gateway &nbsp;·&nbsp; Servidor ultra-liviano &nbsp;·&nbsp;
    <span id="footer-time"></span>
  </footer>

  <!-- ═══════════════ SHARED JS ═══════════════ -->
  <script>
    // Clock
    function tick() {
      const now = new Date().toLocaleTimeString('es', { hour12: false });
      document.getElementById('server-time').textContent = now;
      const ft = document.getElementById('footer-time');
      if (ft) ft.textContent = new Date().toLocaleString('es');
    }
    tick();
    setInterval(tick, 1000);

    // RSSI helper
    function rssiLevel(rssi) {
      if (!rssi) return 0;
      if (rssi > -55) return 4;
      if (rssi > -70) return 3;
      if (rssi > -85) return 2;
      return 1;
    }
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
