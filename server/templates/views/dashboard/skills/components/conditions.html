<!-- CUANDO / CONDICIONES -->
<strong style="font-size: 0.9rem; color: var(--md-primary); border-bottom: 1px solid var(--md-outline-variant); padding-bottom: 8px;">CUANDO / CONDICIONES</strong>

<div class="block" draggable="true" ondragstart="drag(event)" data-type="time" data-zone="condition">
    <div class="icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg></div>
    <div class="block-content">
        <div class="block-title">Tiempo (Reloj)</div>
        <div class="block-desc">A una hora específica</div>
    </div>
</div>

<div class="block" draggable="true" ondragstart="drag(event)" data-type="date" data-zone="condition">
    <div class="icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg></div>
    <div class="block-content">
        <div class="block-title">Fecha / Calendario</div>
        <div class="block-desc">Día específico del año</div>
    </div>
</div>

<div class="block" draggable="true" ondragstart="drag(event)" data-type="weather" data-zone="condition">
    <div class="icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.5 19C19.985 19 22 16.985 22 14.5C22 12.18 20.255 10.25 18 10.03C17.52 7.17 15.01 5 12 5C9.28 5 6.96 6.82 6.18 9.29C3.81 9.53 2 11.53 2 14C2 16.76 4.24 19 7 19H17.5Z"></path></svg></div>
    <div class="block-content">
        <div class="block-title">Clima Externo</div>
        <div class="block-desc">Depende de si llueve, hace sol...</div>
    </div>
</div>

<div class="block" draggable="true" ondragstart="drag(event)" data-type="device_state" data-zone="condition">
    <div class="icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12.55a11 11 0 0 1 14.08 0"></path><path d="M1.42 9a16 16 0 0 1 21.16 0"></path><path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path><line x1="12" y1="20" x2="12.01" y2="20"></line></svg></div>
    <div class="block-content">
        <div class="block-title">Estado de Sensor</div>
        <div class="block-desc">Temperatura, Presencia, Botón...</div>
    </div>
</div>

<div class="block" draggable="true" ondragstart="drag(event)" data-type="location" data-zone="condition">
    <div class="icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg></div>
    <div class="block-content">
        <div class="block-title">Ubicación (GPS)</div>
        <div class="block-desc">Al llegar o salir de casa</div>
    </div>
</div>
