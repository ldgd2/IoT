<!-- ACCIONES / RESPUESTAS -->
<strong style="font-size: 0.9rem; color: var(--md-primary); border-bottom: 1px solid var(--md-outline-variant); padding-bottom: 8px; margin-top: 16px;">ACCIONES / RESPUESTAS</strong>

<div class="block" draggable="true" ondragstart="drag(event)" data-type="action_device" data-zone="action">
    <div class="icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg></div>
    <div class="block-content">
        <div class="block-title">Controlar Dispositivo</div>
        <div class="block-desc">Prender / Apagar / Alternar</div>
    </div>
</div>

<div class="block" draggable="true" ondragstart="drag(event)" data-type="action_color" data-zone="action">
    <div class="icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M12 2a10 10 0 0 0-10 10c0 5.52 4.48 10 10 10 5.52 0 10-4.48 10-10"></path></svg></div>
    <div class="block-content">
        <div class="block-title">Cambiar Color / Brillo</div>
        <div class="block-desc">Para luces y tiras LED</div>
    </div>
</div>

<div class="block" draggable="true" ondragstart="drag(event)" data-type="action_notify" data-zone="action">
    <div class="icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg></div>
    <div class="block-content">
        <div class="block-title">Enviar Notificación</div>
        <div class="block-desc">Mandar mensaje a mi celular</div>
    </div>
</div>

<div class="block" draggable="true" ondragstart="drag(event)" data-type="action_delay" data-zone="action">
    <div class="icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect><rect x="9" y="9" width="6" height="6"></rect><line x1="9" y1="1" x2="9" y2="4"></line><line x1="15" y1="1" x2="15" y2="4"></line><line x1="9" y1="20" x2="9" y2="23"></line><line x1="15" y1="20" x2="15" y2="23"></line></svg></div>
    <div class="block-content">
        <div class="block-title">Esperar (Pausa)</div>
        <div class="block-desc">Detener ejecución por X minutos</div>
    </div>
</div>
